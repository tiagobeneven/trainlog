<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0c0e12"/>
<title>TrainLog 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0e12;--s1:#131720;--s2:#1a1f2e;
  --b1:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.11);--b3:rgba(255,255,255,0.22);
  --tx:#e8edf5;--mu:#6b7694;--mu2:#9aa3bc;
  --c1:#4ecdc4;--c4:#5b9bd5;--c7:#8ab4c8;
  --acc:#4ecdc4;--r:13px;--rs:8px;
  --font:'DM Sans',system-ui,sans-serif;
}
html,body{background:var(--bg);color:var(--tx);font-family:var(--font);min-height:100vh;-webkit-tap-highlight-color:transparent}
.dash{max-width:860px;margin:0 auto;padding:16px 14px 60px}

.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.logo{font-size:17px;font-weight:800;letter-spacing:-.4px}
.logo em{color:var(--acc);font-style:normal}
.hdr-btns{display:flex;gap:5px;flex-wrap:wrap}
.hbtn{background:var(--s2);border:1px solid var(--b2);color:var(--mu2);border-radius:var(--rs);padding:5px 12px;font-size:11px;cursor:pointer;transition:all .15s;font-family:var(--font);font-weight:500}
.hbtn:hover{border-color:var(--b3);color:var(--tx)}
.hbtn.on{background:rgba(78,205,196,.13);border-color:var(--acc);color:var(--acc)}

.fbar{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:11px 13px;margin-bottom:13px;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.fbar-lbl{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.9px;flex-shrink:0}
.ftabs{display:flex;gap:4px;flex-wrap:wrap}
.ftab{padding:4px 11px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid var(--b2);background:var(--s2);color:var(--mu2);transition:all .15s;font-family:var(--font)}
.ftab.active{background:var(--acc);color:#0c0e12;border-color:var(--acc);font-weight:700}
.fsep{width:1px;height:18px;background:var(--b2);flex-shrink:0}
.fsel{background:var(--s2);border:1px solid var(--b2);color:var(--tx);border-radius:var(--rs);padding:4px 9px;font-size:11px;outline:none;cursor:pointer;font-family:var(--font)}
.fi{background:var(--s2);border:1px solid var(--b2);border-radius:var(--rs);padding:4px 9px;color:var(--tx);font-size:11px;outline:none;font-family:var(--font)}
.finfo{font-size:10px;color:var(--mu);margin-left:auto}

.panel{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:14px;margin-bottom:13px;display:none}
.panel.open{display:block}
.panel-title{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.9px;margin-bottom:11px}

.chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px}
.chip{padding:5px 11px;border-radius:20px;font-size:11px;cursor:pointer;border:1.5px solid var(--b2);background:var(--s2);color:var(--mu2);transition:all .15s;user-select:none;font-family:var(--font)}
.chip.sel{font-weight:700;color:#0c0e12}
.reg-row{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.ri{background:var(--s2);border:1px solid var(--b2);border-radius:var(--rs);padding:6px 10px;color:var(--tx);font-size:11px;flex:1;min-width:90px;outline:none;font-family:var(--font)}
.ri:focus{border-color:var(--acc)}
.rbtn{background:var(--acc);color:#0c0e12;border:none;border-radius:var(--rs);padding:6px 15px;font-size:11px;font-weight:800;cursor:pointer;white-space:nowrap;font-family:var(--font)}
.rbtn:hover{opacity:.85}

.hero-row{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:12px}
.hero-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:14px}
.hero-lbl{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.9px;margin-bottom:4px}
.hero-big{font-size:32px;font-weight:900;line-height:1}
.hero-sub{font-size:9px;color:var(--mu);margin-top:3px}
.hero-bar-w{background:rgba(255,255,255,.05);border-radius:3px;height:3px;overflow:hidden;margin-top:9px}
.hero-bar{height:100%;border-radius:3px;transition:width .7s ease}

.stat-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:8px;margin-bottom:12px}
.sc{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:11px 12px;position:relative;overflow:hidden;transition:border-color .2s}
.sc:hover{border-color:var(--b3)}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:var(--r) var(--r) 0 0;background:var(--cc)}
.sc-icon{font-size:15px;margin-bottom:4px}
.sc-lbl{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.8px;margin-bottom:2px}
.sc-val{font-size:22px;font-weight:800;line-height:1;color:var(--cc)}
.sc-sub{font-size:9px;color:var(--mu);margin-top:2px}

.mid{display:grid;grid-template-columns:190px 1fr;gap:9px;margin-bottom:12px}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:14px}
.card-title{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.9px;margin-bottom:11px}
.mbar-row{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.mbar-lbl{font-size:10px;width:56px;text-align:right;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mbar-track{flex:1;background:rgba(255,255,255,.05);border-radius:3px;height:5px;overflow:hidden}
.mbar-fill{height:100%;border-radius:3px;transition:width .5s ease}
.mbar-v{font-size:10px;font-weight:700;width:20px;text-align:right;flex-shrink:0}
.chart-wrap{position:relative;height:165px}

.ccard{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:14px}
.mtabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:9px}
.mtab{background:var(--s2);border:1px solid var(--b1);border-radius:5px;padding:3px 9px;font-size:10px;cursor:pointer;color:var(--mu2);transition:all .15s;font-family:var(--font)}
.mtab.active{background:var(--acc);color:#0c0e12;border-color:var(--acc);font-weight:700}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.ch{font-size:8px;color:var(--mu);text-align:center;padding:3px 0;text-transform:uppercase}
.cd{aspect-ratio:1;border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;cursor:pointer;border:1px solid transparent;transition:transform .1s;gap:1px}
.cd:hover:not(.empty):not(.future){transform:scale(1.12);z-index:2;position:relative}
.cd.empty{opacity:0;cursor:default;pointer-events:none}
.cd.today{border-color:rgba(255,255,255,.22)!important}
.cd.rest{background:rgba(255,255,255,.025);color:rgba(255,255,255,.18)}
.cd.future{color:rgba(255,255,255,.08)}
.cd-n{line-height:1}
.ddots{display:flex;gap:2px;align-items:center}
.ddot{width:3px;height:3px;border-radius:50%;flex-shrink:0}
.leg{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:8px}
.li{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--mu)}
.ld{width:7px;height:7px;border-radius:2px;flex-shrink:0}

.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:6px}
.wday{background:var(--s2);border-radius:var(--rs);padding:8px 4px;text-align:center;border:1px solid var(--b1)}
.wday-name{font-size:8px;color:var(--mu);margin-bottom:2px;text-transform:uppercase}
.wday-n{font-size:12px;color:var(--mu2);margin-bottom:4px;font-weight:700}
.wday-dots{display:flex;justify-content:center;flex-wrap:wrap;gap:2px;min-height:8px}
.wday-count{font-size:9px;color:var(--mu);margin-top:3px}

.cat-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px}
.cat-chip{padding:4px 10px;border-radius:20px;font-size:11px;border:1px solid;background:rgba(255,255,255,.04);display:flex;align-items:center;gap:5px}
.cat-x{opacity:.45;cursor:pointer;font-size:10px;transition:opacity .15s}
.cat-x:hover{opacity:1}
.addf{display:none;gap:7px;align-items:center;flex-wrap:wrap;margin-top:9px;padding-top:9px;border-top:1px solid var(--b1)}
.addf.open{display:flex}
.cdots{display:flex;gap:5px;align-items:center}
.cdot{width:16px;height:16px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .15s;flex-shrink:0}
.cdot.sel{border-color:#fff}

.toast{position:fixed;bottom:16px;right:16px;background:var(--s2);border:1px solid var(--acc);color:var(--acc);padding:6px 13px;border-radius:var(--rs);font-size:11px;transform:translateY(50px);opacity:0;transition:all .3s;z-index:99;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}

@media(max-width:600px){
  .hero-row{grid-template-columns:1fr 1fr}
  .hero-row .hero-card:last-child{grid-column:1/-1}
  .mid{grid-template-columns:1fr}
  .stat-strip{grid-template-columns:repeat(2,1fr)}
  .fbar{gap:7px}
}
@media(max-width:380px){
  .hero-row{grid-template-columns:1fr}
  .hero-row .hero-card:last-child{grid-column:auto}
}
</style>
</head>
<body>
<div class="dash">

  <div class="header">
    <div class="logo">TRAIN<em>LOG</em> <span style="color:var(--mu);font-weight:400;font-size:13px">2026</span></div>
    <div class="hdr-btns">
      <button class="hbtn" id="btn-reg" onclick="togglePanel('reg')">+ Registrar</button>
      <button class="hbtn" id="btn-cat" onclick="togglePanel('cat')">⚙ Categorias</button>
      <button class="hbtn" onclick="exportData()">↓ Export</button>
      <label class="hbtn" style="cursor:pointer">↑ Import<input type="file" accept=".json" onchange="importData(event)" style="display:none"/></label>
    </div>
  </div>

  <div class="fbar">
    <span class="fbar-lbl">Período</span>
    <div class="ftabs">
      <div class="ftab active" onclick="setRange('all',this)">Tudo</div>
      <div class="ftab" onclick="setRange('year',this)">Ano</div>
      <div class="ftab" onclick="setRange('month',this)">Mês</div>
      <div class="ftab" onclick="setRange('week',this)">Semana</div>
      <div class="ftab" onclick="setRange('custom',this)">Intervalo</div>
    </div>
    <div class="fsep"></div>
    <div id="range-controls" style="display:flex;gap:6px;align-items:center;flex-wrap:wrap"></div>
    <div class="finfo" id="finfo"></div>
  </div>

  <div id="panel-reg" class="panel">
    <div class="panel-title">Registrar treino</div>
    <div class="chips" id="reg-chips"></div>
    <div class="reg-row">
      <input type="date" class="ri" id="reg-date" style="max-width:140px"/>
      <input type="text" class="ri" placeholder="Observação (ex: 5km, fisioclin...)" id="reg-obs"/>
      <button class="rbtn" onclick="doRegister()">Salvar</button>
    </div>
  </div>

  <div id="panel-cat" class="panel">
    <div class="panel-title">Categorias</div>
    <div class="cat-row" id="cat-manage"></div>
    <div class="addf" id="addf">
      <input type="text" class="ri" placeholder="Nome da categoria" id="new-cat-name" style="max-width:160px"/>
      <div class="cdots" id="cdots"></div>
      <button class="rbtn" onclick="doAddCat()">Criar</button>
    </div>
    <div style="margin-top:9px;padding-top:9px;border-top:1px solid var(--b1)">
      <button class="hbtn" onclick="toggleAddCatForm()">+ Nova categoria</button>
    </div>
  </div>

  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-lbl">Dias ativos</div>
      <div class="hero-big" id="h-active" style="color:var(--c1)">0</div>
      <div class="hero-sub" id="h-active-sub"></div>
      <div class="hero-bar-w"><div class="hero-bar" id="h-bar1" style="background:var(--c1);width:0%"></div></div>
    </div>
    <div class="hero-card">
      <div class="hero-lbl">Total de treinos</div>
      <div class="hero-big" id="h-total" style="color:var(--c4)">0</div>
      <div class="hero-sub" id="h-total-sub"></div>
      <div class="hero-bar-w"><div class="hero-bar" id="h-bar2" style="background:var(--c4);width:0%"></div></div>
    </div>
    <div class="hero-card">
      <div class="hero-lbl">Dias duplos</div>
      <div class="hero-big" id="h-double" style="color:var(--c7)">0</div>
      <div class="hero-sub" id="h-double-sub"></div>
      <div class="hero-bar-w"><div class="hero-bar" id="h-bar3" style="background:var(--c7);width:0%"></div></div>
    </div>
  </div>

  <div class="stat-strip" id="stat-strip"></div>

  <div class="mid">
    <div class="card">
      <div class="card-title">Por modalidade</div>
      <div id="mini-bars"></div>
    </div>
    <div class="card">
      <div class="card-title" id="chart-title">Histórico mensal</div>
      <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
    </div>
  </div>

  <div class="ccard">
    <div class="card-title">Calendário</div>
    <div class="mtabs" id="mtabs"></div>
    <div class="leg" id="legend"></div>
    <div id="week-view" style="display:none"><div class="week-grid" id="week-grid"></div></div>
    <div id="month-view"><div class="cgrid" id="cgrid"></div></div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const PAL=['#4ecdc4','#5b9bd5','#8ab4c8','#2a9d8f','#3a7abf','#6896b0','#1a7a6e','#1e5fa8','#3d6b8a','#a8dadc'];
const DIAS=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const MN=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
function pad(n){return String(n).padStart(2,'0')}
function dk(y,m,d){return `${y}-${pad(m)}-${pad(d)}`}
const TODAY=new Date();TODAY.setHours(0,0,0,0);
const TK=dk(TODAY.getFullYear(),TODAY.getMonth()+1,TODAY.getDate());
const DOY=Math.ceil((TODAY-new Date(TODAY.getFullYear(),0,1))/86400000)+1;

const DEF_CATS=[
  {id:'academia',name:'Academia',color:'#4ecdc4',icon:'🏋️'},
  {id:'corrida', name:'Corrida', color:'#5b9bd5',icon:'🏃'},
  {id:'futebol', name:'Futebol', color:'#8ab4c8',icon:'⚽'},
  {id:'outros',  name:'Outros', color:'#3a7abf',icon:'✨'},
];
function buildDefWorkouts(){
  const w={};
  const pw=(d,id)=>{if(!w[d])w[d]=[];w[d].push(id);};
  ["2026-01-02","2026-01-03","2026-01-04","2026-01-05","2026-01-06","2026-01-07","2026-01-08","2026-01-09","2026-01-12","2026-01-13","2026-01-14","2026-01-15","2026-01-16","2026-01-18","2026-01-19","2026-01-20","2026-01-21","2026-01-22","2026-01-23","2026-01-24","2026-01-25","2026-01-26","2026-01-27","2026-01-28","2026-01-29","2026-01-30","2026-01-31","2026-02-02","2026-02-03","2026-02-04","2026-02-05","2026-02-06","2026-02-07","2026-02-09","2026-02-10","2026-02-11","2026-02-12","2026-02-13","2026-02-16","2026-02-18","2026-02-19","2026-02-20","2026-02-21","2026-02-22","2026-02-23","2026-02-24","2026-02-25","2026-02-26","2026-02-27","2026-02-28","2026-03-02","2026-03-03","2026-03-04","2026-03-05","2026-03-06","2026-03-07","2026-03-09","2026-03-10","2026-03-11","2026-03-12","2026-03-13","2026-03-16","2026-03-17","2026-03-18","2026-03-19","2026-03-20","2026-03-21","2026-03-23"].forEach(d=>pw(d,'academia'));
  ["2026-01-10","2026-01-17","2026-01-24","2026-02-10","2026-02-15","2026-02-17","2026-02-11","2026-03-07"].forEach(d=>pw(d,'corrida'));
  ["2026-01-03","2026-01-05","2026-01-10","2026-01-17","2026-01-21","2026-01-24","2026-01-27","2026-01-28","2026-01-31","2026-02-10","2026-02-11","2026-02-12","2026-03-02","2026-03-03","2026-03-04","2026-03-05","2026-03-06","2026-03-07","2026-03-09","2026-03-10","2026-03-11","2026-03-12","2026-03-13","2026-03-16","2026-03-17"].forEach(d=>pw(d,'futebol'));
  return w;
}

function loadState(){
  try{
    const s=localStorage.getItem('trainlog2026');
    if(s){const p=JSON.parse(s);return{cats:p.cats||DEF_CATS,workouts:p.workouts||buildDefWorkouts(),obsMap:p.obsMap||{"2026-01-24":"5km","2026-01-29":"fisioclin","2026-02-15":"5km","2026-02-17":"7km"}};}
  }catch(e){}
  return{cats:JSON.parse(JSON.stringify(DEF_CATS)),workouts:buildDefWorkouts(),obsMap:{"2026-01-24":"5km","2026-01-29":"fisioclin","2026-02-15":"5km","2026-02-17":"7km"}};
}
let{cats,workouts,obsMap}=loadState();

let saveTimer=null;
function save(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    try{localStorage.setItem('trainlog2026',JSON.stringify({cats,workouts,obsMap}));}catch(e){}
    toast('Salvo ✓');
  },500);
}

function exportData(){
  const b=new Blob([JSON.stringify({cats,workouts,obsMap},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='trainlog2026_backup.json';a.click();
}
function importData(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const p=JSON.parse(ev.target.result);
      if(p.workouts){if(p.cats)cats=p.cats;workouts=p.workouts;if(p.obsMap)obsMap=p.obsMap;save();renderAll();toast('Importado ✓');}
    }catch(e2){toast('Erro ao importar');}
  };
  r.readAsText(f);e.target.value='';
}

let rangeMode='all',filterMonth=TODAY.getMonth(),filterYear=2026,filterWeekOff=0,customFrom='',customTo='';
let curMonth=TODAY.getMonth(),selChips=new Set(),selColor=PAL[0],mainChart=null;

function getWeekStart(off){const d=new Date(TODAY);d.setDate(d.getDate()-d.getDay()+off*7);d.setHours(0,0,0,0);return d;}
function getFilteredKeys(){
  return Object.keys(workouts).filter(d=>{
    const dt=new Date(d+'T00:00:00');
    if(rangeMode==='all')return true;
    if(rangeMode==='year')return dt.getFullYear()===filterYear;
    if(rangeMode==='month')return dt.getFullYear()===filterYear&&dt.getMonth()===filterMonth;
    if(rangeMode==='week'){const ws=getWeekStart(filterWeekOff),we=new Date(ws);we.setDate(we.getDate()+6);return dt>=ws&&dt<=we;}
    if(rangeMode==='custom'&&customFrom&&customTo)return d>=customFrom&&d<=customTo;
    return true;
  });
}
function computeStats(){
  const keys=getFilteredKeys();
  const catC={};cats.forEach(c=>catC[c.id]=0);
  let active=0,total=0,doubles=0;const byLabel={};
  keys.forEach(d=>{
    const mods=workouts[d]||[];if(!mods.length)return;
    active++;total+=mods.length;if(mods.length>1)doubles++;
    const dt=new Date(d+'T00:00:00');
    const lbl=rangeMode==='week'?DIAS[dt.getDay()]:rangeMode==='month'?String(dt.getDate()):MN[dt.getMonth()];
    if(!byLabel[lbl])byLabel[lbl]={};
    mods.forEach(id=>{if(catC[id]!==undefined)catC[id]++;byLabel[lbl][id]=(byLabel[lbl][id]||0)+1;});
  });
  return{catC,active,total,doubles,byLabel};
}
function periodDays(){
  if(rangeMode==='all')return DOY;
  if(rangeMode==='year')return filterYear===TODAY.getFullYear()?DOY:365;
  if(rangeMode==='month'){const dim=new Date(filterYear,filterMonth+1,0).getDate();return filterYear===TODAY.getFullYear()&&filterMonth===TODAY.getMonth()?TODAY.getDate():dim;}
  if(rangeMode==='week')return 7;
  if(rangeMode==='custom'&&customFrom&&customTo)return Math.round((new Date(customTo)-new Date(customFrom))/86400000)+1;
  return DOY;
}

function setRange(mode,el){
  rangeMode=mode;
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  if(mode==='week')filterWeekOff=0;
  if(mode==='month'){filterMonth=TODAY.getMonth();curMonth=TODAY.getMonth();}
  renderAll();
}
function renderRangeControls(){
  const w=document.getElementById('range-controls');
  let html='';
  if(rangeMode==='month'){
    html=`<select class="fsel" onchange="filterMonth=+this.value;curMonth=+this.value;renderAll()">`;
    for(let i=0;i<=TODAY.getMonth();i++)html+=`<option value="${i}"${i===filterMonth?' selected':''}>${MN[i]} 2026</option>`;
    html+=`</select>`;
  }else if(rangeMode==='week'){
    const ws=getWeekStart(filterWeekOff),we=new Date(ws);we.setDate(we.getDate()+6);
    const fmt=d=>`${d.getDate()} ${MN[d.getMonth()]}`;
    html=`<button class="hbtn" onclick="shiftWeek(-1)">←</button><span style="font-size:11px;color:var(--mu2);white-space:nowrap">${fmt(ws)} – ${fmt(we)}</span><button class="hbtn" onclick="shiftWeek(1)">→</button>`;
  }else if(rangeMode==='custom'){
    html=`<input type="date" class="fi" value="${customFrom}" onchange="customFrom=this.value;renderAll()" style="max-width:130px"/>
          <span style="font-size:11px;color:var(--mu)">até</span>
          <input type="date" class="fi" value="${customTo}" onchange="customTo=this.value;renderAll()" style="max-width:130px"/>`;
  }
  w.innerHTML=html;
  const{active,total}=computeStats();
  document.getElementById('finfo').textContent=`${active} dias · ${total} treinos`;
}
function shiftWeek(d){const ws=getWeekStart(filterWeekOff+d);if(ws>TODAY)return;filterWeekOff+=d;renderRangeControls();renderAll();}

function togglePanel(id){
  ['reg','cat'].forEach(k=>{
    const el=document.getElementById('panel-'+k);
    const btn=document.getElementById('btn-'+k);
    if(k===id){const o=el.classList.contains('open');el.classList.toggle('open',!o);btn.classList.toggle('on',!o);}
    else{el.classList.remove('open');btn&&btn.classList.remove('on');}
  });
}

function renderRegChips(){
  document.getElementById('reg-chips').innerHTML=cats.map(c=>{
    const s=selChips.has(c.id);
    return`<div class="chip${s?' sel':''}" style="${s?`background:${c.color};border-color:${c.color};color:#0c0e12`:`border-color:${c.color}44;color:${c.color}`}" onclick="toggleChip('${c.id}')">${c.icon} ${c.name}</div>`;
  }).join('');
}
function toggleChip(id){selChips.has(id)?selChips.delete(id):selChips.add(id);renderRegChips();}
function doRegister(){
  const date=document.getElementById('reg-date').value;
  const obs=document.getElementById('reg-obs').value.trim();
  if(!date){toast('Escolha uma data!');return;}
  if(!selChips.size){toast('Selecione ao menos 1 modalidade!');return;}
  if(!workouts[date])workouts[date]=[];
  selChips.forEach(id=>workouts[date].push(id));
  if(obs)obsMap[date]=obs;
  selChips.clear();document.getElementById('reg-obs').value='';
  save();renderAll();
}

function renderCatManage(){
  document.getElementById('cat-manage').innerHTML=cats.map(c=>
    `<div class="cat-chip" style="border-color:${c.color};color:${c.color}">${c.icon} ${c.name}<span class="cat-x" onclick="removeCat('${c.id}')">✕</span></div>`
  ).join('');
}
function removeCat(id){if(cats.length<2){toast('Mínimo 1 categoria');return;}cats=cats.filter(c=>c.id!==id);save();renderAll();}
function toggleAddCatForm(){const f=document.getElementById('addf');f.classList.toggle('open');if(f.classList.contains('open'))renderColorDots();}
function renderColorDots(){document.getElementById('cdots').innerHTML=PAL.map(c=>`<div class="cdot${c===selColor?' sel':''}" style="background:${c}" onclick="selColor='${c}';renderColorDots()"></div>`).join('');}
function doAddCat(){
  const name=document.getElementById('new-cat-name').value.trim();
  if(!name){toast('Digite um nome!');return;}
  cats.push({id:'cat_'+Date.now(),name,color:selColor,icon:'🏅'});
  document.getElementById('new-cat-name').value='';
  document.getElementById('addf').classList.remove('open');
  save();renderAll();toast(`"${name}" criada!`);
}

function renderHero(){
  const{active,total,doubles}=computeStats();const pd=periodDays();
  document.getElementById('h-active').textContent=active;
  document.getElementById('h-active-sub').textContent=`de ${pd} dias no período`;
  document.getElementById('h-bar1').style.width=Math.min(100,Math.round(active/pd*100))+'%';
  document.getElementById('h-total').textContent=total;
  document.getElementById('h-total-sub').textContent=`${active?(total/active).toFixed(1):0} por dia ativo`;
  document.getElementById('h-bar2').style.width=Math.min(100,Math.round(total/Math.max(pd,1)*100))+'%';
  document.getElementById('h-double').textContent=doubles;
  document.getElementById('h-double-sub').textContent=`${active?(doubles/active*100).toFixed(0):0}% dos dias ativos`;
  document.getElementById('h-bar3').style.width=Math.min(100,Math.round(doubles/Math.max(active,1)*100))+'%';
}
function renderStatStrip(){
  const{catC}=computeStats();
  document.getElementById('stat-strip').innerHTML=cats.map(c=>
    `<div class="sc" style="--cc:${c.color}"><div class="sc-icon">${c.icon}</div><div class="sc-lbl">${c.name}</div><div class="sc-val">${catC[c.id]||0}</div><div class="sc-sub">treinos</div></div>`
  ).join('');
}
function renderMiniBars(){
  const{catC,total}=computeStats();const t=total||1;
  document.getElementById('mini-bars').innerHTML=cats.map(c=>{
    const v=catC[c.id]||0,p=Math.round(v/t*100);
    return`<div class="mbar-row"><div class="mbar-lbl" style="color:${c.color}">${c.name}</div><div class="mbar-track"><div class="mbar-fill" style="width:${p}%;background:${c.color}"></div></div><div class="mbar-v" style="color:${c.color}">${v}</div></div>`;
  }).join('');
}
function renderChart(){
  const{byLabel}=computeStats();
  let labels=[];
  if(rangeMode==='week'){const ws=getWeekStart(filterWeekOff);labels=Array.from({length:7},(_,i)=>{const d=new Date(ws);d.setDate(d.getDate()+i);return DIAS[d.getDay()];});}
  else if(rangeMode==='month'){const dim=new Date(filterYear,filterMonth+1,0).getDate();labels=Array.from({length:dim},(_,i)=>String(i+1));}
  else{labels=MN.slice(0,TODAY.getMonth()+1);}
  document.getElementById('chart-title').textContent=rangeMode==='week'?'Esta semana':rangeMode==='month'?`${MN[filterMonth]} ${filterYear}`:'Histórico mensal';
  if(mainChart)mainChart.destroy();
  mainChart=new Chart(document.getElementById('mainChart'),{
    type:'bar',
    data:{labels,datasets:cats.map(c=>({label:c.name,data:labels.map(l=>(byLabel[l]||{})[c.id]||0),backgroundColor:c.color+'99',borderColor:c.color,borderWidth:1.5,borderRadius:3,borderSkipped:false}))},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#6b7694',font:{size:9},maxRotation:0,autoSkip:labels.length>15}},y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#6b7694',font:{size:9}},beginAtZero:true}}}
  });
}
function renderMonthTabs(){
  document.getElementById('mtabs').innerHTML=Array.from({length:TODAY.getMonth()+1},(_,i)=>
    `<div class="mtab${i===curMonth?' active':''}" onclick="curMonth=${i};renderCalendar()">${MN[i]}</div>`
  ).join('');
}
function renderLegend(){
  document.getElementById('legend').innerHTML=cats.map(c=>`<div class="li"><div class="ld" style="background:${c.color}"></div>${c.name}</div>`).join('');
}
function renderCalendar(){
  if(rangeMode==='week'){
    document.getElementById('week-view').style.display='block';
    document.getElementById('month-view').style.display='none';
    document.getElementById('mtabs').style.display='none';
    const ws=getWeekStart(filterWeekOff);
    document.getElementById('week-grid').innerHTML=Array.from({length:7},(_,i)=>{
      const d=new Date(ws);d.setDate(d.getDate()+i);
      const key=dk(d.getFullYear(),d.getMonth()+1,d.getDate());
      const mods=workouts[key]||[];const uniq=[...new Set(mods)];
      const isToday=key===TK,isFut=d>TODAY;
      return`<div class="wday" style="${isToday?'border-color:rgba(78,205,196,.35)':''}">
        <div class="wday-name">${DIAS[d.getDay()]}</div>
        <div class="wday-n" style="color:${isToday?'var(--acc)':isFut?'rgba(255,255,255,.12)':'var(--mu2)'}">${d.getDate()}</div>
        <div class="wday-dots">${uniq.map(id=>{const c=cats.find(x=>x.id===id);return c?`<div class="ddot" style="background:${c.color};width:8px;height:8px;border-radius:2px"></div>`:''}).join('')}</div>
        ${mods.length?`<div class="wday-count">${mods.length} treino${mods.length>1?'s':''}</div>`:''}
      </div>`;
    }).join('');
  }else{
    document.getElementById('week-view').style.display='none';
    document.getElementById('month-view').style.display='block';
    document.getElementById('mtabs').style.display='flex';
    const y=2026,m=curMonth;
    const first=new Date(y,m,1).getDay();
    const dim=new Date(y,m+1,0).getDate();
    let html=DIAS.map(d=>`<div class="ch">${d}</div>`).join('');
    html+=Array(first).fill('<div class="cd empty"></div>').join('');
    for(let d=1;d<=dim;d++){
      const key=dk(y,m+1,d);const dt=new Date(y,m,d);
      const mods=workouts[key]||[];const uniq=[...new Set(mods)];
      const isToday=key===TK,isFut=dt>TODAY;
      let bg='transparent',tc='';
      if(uniq.length===1){const c=cats.find(x=>x.id===uniq[0]);if(c){bg=c.color+'2e';tc=c.color;}}
      else if(uniq.length>1){bg='rgba(255,255,255,.08)';tc='var(--mu2)';}
      const obs=obsMap[key]||'';
      const title=uniq.map(id=>{const c=cats.find(x=>x.id===id);return c?c.name:id}).join(' + ')+(obs?' — '+obs:'');
      const dots=uniq.map(id=>{const c=cats.find(x=>x.id===id);return c?`<div class="ddot" style="background:${c.color}"></div>`:''}).join('');
      html+=`<div class="cd${isToday?' today':isFut?' future':mods.length===0?' rest':''}" style="background:${bg};color:${tc||'inherit'}" title="${title}">
        <span class="cd-n">${d}</span>${uniq.length?`<div class="ddots">${dots}</div>`:''}
      </div>`;
    }
    document.getElementById('cgrid').innerHTML=html;
  }
}

let toastTimer=null;
function toast(msg){
  const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2000);
}

function renderAll(){
  renderHero();renderStatStrip();renderMiniBars();renderChart();
  renderMonthTabs();renderLegend();renderCalendar();
  renderRegChips();renderCatManage();renderRangeControls();
}

const nd=TODAY;
document.getElementById('reg-date').value=`${nd.getFullYear()}-${pad(nd.getMonth()+1)}-${pad(nd.getDate())}`;
renderAll();
</script>
</body>
</html>
